services:
  - type: web
    name: sure-odds-api
    runtime: docker
    rootDir: sure-odds/backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: O_DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
